services:
  app:
    build: ./backend
    container_name: catalojogo-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/catalojogodb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=catalojogo
    networks:
      - app-network

  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=catalojogo
      - POSTGRES_DB=catalojogodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "4321:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d catalojogodb" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
